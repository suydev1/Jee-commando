<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIR 1 Command Center</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
font-family:sans-serif;
padding:30px;
}
.glass{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(20px);
border-radius:20px;
padding:20px;
margin-bottom:20px;
}
button,input,select{
padding:8px;
border-radius:10px;
border:none;
}
button{cursor:pointer;}
</style>
</head>

<body>

<h1>Suyash | AIR 1 2027</h1>

<div class="glass">
<select id="subject">
<option>Physics</option>
<option>Chemistry</option>
<option>Mathematics</option>
</select>
<input type="number" id="hours" placeholder="Hours">
<button onclick="add()">Add</button>
</div>

<div class="glass">
<h2>Total Hours: <span id="total">0</span></h2>
<canvas id="chart"></canvas>
</div>

<script>
let data = JSON.parse(localStorage.getItem("jeeData")) || {
Physics:0,Chemistry:0,Mathematics:0
};

function save(){
localStorage.setItem("jeeData",JSON.stringify(data));
}

function add(){
let sub=document.getElementById("subject").value;
let hrs=parseInt(document.getElementById("hours").value);
if(!hrs) return;
data[sub]+=hrs;
save();
update();
}

function update(){
document.getElementById("total").innerText =
data.Physics+data.Chemistry+data.Mathematics;

if(window.myChart) window.myChart.destroy();
let ctx=document.getElementById("chart");
window.myChart=new Chart(ctx,{
type:"bar",
data:{
labels:["Physics","Chemistry","Mathematics"],
datasets:[{data:[
data.Physics,
data.Chemistry,
data.Mathematics
]}]
}
});
}

update();

if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
