<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIR 1 Command Center</title>

<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
padding:30px;
}

h1{margin-bottom:20px;}

.card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

button,input,select{
padding:8px;
border-radius:8px;
border:none;
margin-top:5px;
}

button{cursor:pointer;}
</style>
</head>

<body>

<h1>Suyash | AIR 1 2027</h1>

<div class="card">
<select id="subject">
<option>Physics</option>
<option>Chemistry</option>
<option>Mathematics</option>
</select>
<input type="number" id="hours" placeholder="Hours">
<button onclick="addHours()">Add</button>
</div>

<div class="card">
<h2>Total Hours: <span id="total">0</span></h2>
<canvas id="chart"></canvas>
</div>

<script>
let data = JSON.parse(localStorage.getItem("jeeData")) || {
Physics:0,
Chemistry:0,
Mathematics:0
};

function save(){
localStorage.setItem("jeeData",JSON.stringify(data));
}

function addHours(){
let sub=document.getElementById("subject").value;
let hrs=parseInt(document.getElementById("hours").value);
if(!hrs || hrs<=0) return;
data[sub]+=hrs;
save();
update();
}

function update(){
let total = data.Physics + data.Chemistry + data.Mathematics;
document.getElementById("total").innerText = total;

if(window.myChart) window.myChart.destroy();

window.myChart = new Chart(
document.getElementById("chart"),
{
type:"bar",
data:{
labels:["Physics","Chemistry","Mathematics"],
datasets:[{
data:[data.Physics,data.Chemistry,data.Mathematics]
}]
},
options:{responsive:true}
}
);
}

update();

if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
